"$schema" = "schemas/schema.json"

[default]
description = "Default permissions for the co-worker plugin. Allows every command in the surface."
permissions = [
    "allow-set-base-url",
    "allow-get-base-url",
    "allow-health",
    "allow-list-models",
    "allow-model-catalog",
    "allow-load-model",
    "allow-list-sessions",
    "allow-get-session",
    "allow-create-session",
    "allow-delete-session",
    "allow-update-session",
    "allow-debug-session",
    "allow-send-message",
    "allow-chat",
    "allow-list-memories",
    "allow-create-memory",
    "allow-delete-memory",
    "allow-get-workspace",
    "allow-set-workspace",
    "allow-tool-list-dir",
    "allow-tool-read-file",
    "allow-tool-write-file",
    "allow-tool-append-file",
    "allow-tool-delete-path",
    "allow-tool-move-path",
    "allow-tool-create-dir",
    "allow-agent-send",
    "allow-agent-continue",
]
